name: precompute-sun

on:
  schedule:
    # 03:00 UTC todos los días (≈ 04:00/05:00 hora Madrid según DST)
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run precompute:sun

      - name: Commit cambios si los hay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/solar-day.json)" ]; then
            git add public/solar-day.json
            git commit -m "chore(precompute): solar-day diario"
            git push
          else
            echo "Sin cambios en solar-day.json."
          fi
